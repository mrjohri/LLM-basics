<!DOCTYPE html>
<html>
<head>
    <title>PromptLab - 3 Panel AI Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>PromptLab - Compare LLM Behavior</h2>

<!-- PANELS -->
<div class="container">

    <!-- PANEL TEMPLATE -->
    <div class="panel" id="panel0">
        <div class="settings">
            <h3>Panel 1</h3>

            <label>System Prompt</label>
            <input type="text" class="system" placeholder="e.g. You are a strict professor">

            <label>Temperature</label>
            <input type="range" min="0" max="1" step="0.1" value="0.7" class="temp">
            <span class="value temp-val">0.7</span>

            <label>Top P</label>
            <input type="range" min="0" max="1" step="0.05" value="1" class="top_p">
            <span class="value top_p-val">1</span>

            <label>Max Tokens</label>
            <input type="number" value="200" class="tokens">
        </div>

        <div class="chat" id="chat0"></div>
    </div>

    <!-- PANEL 2 -->
    <div class="panel" id="panel1">
        <div class="settings">
            <h3>Panel 2</h3>

            <label>System Prompt</label>
            <input type="text" class="system" placeholder="e.g. You are a friendly teacher">

            <label>Temperature</label>
            <input type="range" min="0" max="1" step="0.1" value="0.7" class="temp">
            <span class="value temp-val">0.7</span>

            <label>Top P</label>
            <input type="range" min="0" max="1" step="0.05" value="1" class="top_p">
            <span class="value top_p-val">1</span>

            <label>Max Tokens</label>
            <input type="number" value="200" class="tokens">
        </div>

        <div class="chat" id="chat1"></div>
    </div>

    <!-- PANEL 3 -->
    <div class="panel" id="panel2">
        <div class="settings">
            <h3>Panel 3</h3>

            <label>System Prompt</label>
            <input type="text" class="system" placeholder="e.g. You are a creative storyteller">

            <label>Temperature</label>
            <input type="range" min="0" max="1" step="0.1" value="0.7" class="temp">
            <span class="value temp-val">0.7</span>

            <label>Top P</label>
            <input type="range" min="0" max="1" step="0.05" value="1" class="top_p">
            <span class="value top_p-val">1</span>

            <label>Max Tokens</label>
            <input type="number" value="200" class="tokens">
        </div>

        <div class="chat" id="chat2"></div>
    </div>

</div>

<!-- INPUT -->
<div class="input-area">
    <input id="message" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script src="/static/script.js"></script>

</body>
</html>
